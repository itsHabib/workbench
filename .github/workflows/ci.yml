name: CI

on:
  push:
    branches: [main]
  pull_request:

# One module, so `check` runs the whole tree: a shared `contracts` change must
# retest every consumer, and module-wide `go test` is faster + safer than
# path-filtering that could green a tool whose contract shifted under it.
# Per-tool path-filtered jobs are a documented follow-up (FOLLOWUPS.md), owed
# only once the tool count or test time makes module-wide retest wasteful.
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "unformatted files:" && echo "$out" && exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - name: go test
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage summary
        if: always()
        run: |
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage.out ]; then
            go tool cover -func=coverage.out | tail -n 1 >> $GITHUB_STEP_SUMMARY
          else
            echo "_no coverage profile produced — see test step for failure details_" >> $GITHUB_STEP_SUMMARY
          fi
      - name: upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          retention-days: 30
          if-no-files-found: ignore
          path: coverage.out
      - name: go build
        run: go build ./...

  controlroom-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm
          cache-dependency-path: cmd/controlroom/e2e/package-lock.json
      - name: install pinned browser test package
        run: npm --prefix cmd/controlroom/e2e ci
      - name: install Chromium runtime
        run: npx --prefix cmd/controlroom/e2e playwright install --with-deps chromium
      - name: Control Room browser matrix
        run: npm --prefix cmd/controlroom/e2e test
      - name: upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: controlroom-playwright-report
          retention-days: 14
          if-no-files-found: ignore
          path: cmd/controlroom/e2e/playwright-report/

  # The boundary law, enforced mechanically instead of by discipline:
  # "share contracts, not call stacks." contracts imports nothing else in the
  # module; local (a shared mechanism package) imports at most contracts; no
  # tool imports another tool's decision code. A breach fails here.
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: contracts is a leaf
        # Every contracts domain (contracts, contracts/execution, ...) is its
        # own leaf: it imports nothing else in the module, not even a sibling
        # domain.
        run: |
          mod=github.com/itsHabib/workbench
          fail=0
          for pkg in $(go list ./contracts/...); do
            deps=$(go list -deps "$pkg" | grep "^${mod}/" | grep -v "^${pkg}\$" || true)
            if [ -n "$deps" ]; then
              echo "$pkg must import nothing else in the module, but pulls in:" >&2
              echo "$deps" >&2
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then echo "contracts domains are leaves ✓"; fi
          exit $fail
      - name: local is a mechanism leaf
        # "at most contracts" means any contracts domain — root or a
        # sub-domain like contracts/execution. Shared vocabulary is importable
        # by law; decision code never lives there, so nothing extra leaks in.
        run: |
          mod=github.com/itsHabib/workbench
          deps=$(go list -deps ./local | grep "^${mod}/" | grep -Ev "^${mod}/(local|contracts(/.*)?)$" || true)
          if [ -n "$deps" ]; then
            echo "local is a shared mechanism and may import at most contracts, but pulls in:" >&2
            echo "$deps" >&2
            exit 1
          fi
          echo "local is a mechanism leaf ✓"
      - name: no tool imports another tool's code
        run: |
          mod=github.com/itsHabib/workbench
          fail=0
          for tooldir in cmd/*/; do
            tool=$(basename "$tooldir")
            deps=$(go list -deps ./cmd/$tool/... | grep "^${mod}/cmd/" || true)
            bad=$(echo "$deps" | grep -Ev "^${mod}/cmd/${tool}(/|\$)" || true)
            if [ -n "$bad" ]; then
              echo "cmd/$tool reaches into another tool's tree:" >&2
              echo "$bad" >&2
              fail=1
            fi
          done
          if [ "$fail" -eq 0 ]; then echo "no cross-tool imports ✓"; fi
          exit $fail
